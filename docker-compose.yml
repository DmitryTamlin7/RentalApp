services:
  db:
    image: postgres:15
    container_name: rental_db
    environment:
      POSTGRES_DB: rentaldb
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: rentalpass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental -d rentaldb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rental_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rentaldb
      SPRING_DATASOURCE_USERNAME: rental
      SPRING_DATASOURCE_PASSWORD: rentalpass
    ports:
      - "8080:8080"

volumes:
  db_data:
